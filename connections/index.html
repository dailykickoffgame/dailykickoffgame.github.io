<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connections – Daily Game</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

#words {
  margin-top: 20px;
}

button {
  padding: 10px;
  margin: 6px;
  border-radius: 6px;
  cursor: pointer;
}

.selected {
  background: #22c55e;
}

.correct {
  background: #16a34a;
}

.disabled {
  opacity: 0.4;
  pointer-events: none;
}

#timer {
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>Connections 🧠</h1>
<p>Select 4 related words</p>

<div id="words"></div>
<p id="result"></p>
<p id="mistakes"></p>

<button onclick="share()">Share</button>

<p id="timer"></p>

<script>

// GROUPS
const groups = [
  ["apple","banana","orange","grape"],
  ["car","bus","train","bike"],
  ["dog","cat","lion","tiger"],
  ["red","blue","green","yellow"]
]

// STATE
let selected = []
let foundGroups = 0
let mistakes = 0
const maxMistakes = 4
let solvedWords = []
let gameOver = false
let resultGrid = ""

// SHUFFLE
function shuffle(array){
  return array.sort(() => Math.random() - 0.5)
}

let allWords = shuffle(groups.flat())

// RENDER
function render(){
  document.getElementById("words").innerHTML =
    allWords.map(w => {
      let classes = ""

      if(selected.includes(w)) classes += "selected "
      if(solvedWords.includes(w)) classes += "correct disabled"

      return `<button class="${classes}" onclick="pick('${w}')">${w}</button>`
    }).join("")
}

// PICK
function pick(word){
  if(gameOver) return
  if(selected.includes(word)) return

  selected.push(word)
  render()

  if(selected.length === 4){
    checkGroup()
  }
}

// CHECK
function checkGroup(){
  let correct = groups.some(group =>
    selected.every(w => group.includes(w))
  )

  if(correct){
    solvedWords.push(...selected)
    foundGroups++
    resultGrid += "🟩"
    document.getElementById("result").innerText = "✅ Correct group!"
  } else {
    mistakes++
    resultGrid += "🟥"
    document.getElementById("result").innerText = "❌ Wrong group"
  }

  selected = []
  updateMistakes()

  if(foundGroups === 4){
    endGame(true)
  }

  if(mistakes >= maxMistakes){
    endGame(false)
  }

  render()
}

// MISTAKES UI
function updateMistakes(){
  document.getElementById("mistakes").innerText =
    `Mistakes: ${mistakes} / ${maxMistakes}`
}

// END GAME
function endGame(win){
  gameOver = true

  if(win){
    document.getElementById("result").innerText = "🎉 You won!"
  } else {
    document.getElementById("result").innerText = "💀 Game Over"
  }

  startCountdown()
}

// COUNTDOWN (SADECE GAME OVER'DA)
function startCountdown(){
  function update(){
    let now = new Date()
    let tomorrow = new Date()
    tomorrow.setHours(24,0,0,0)

    let diff = tomorrow - now
    let hours = Math.floor(diff / 1000 / 60 / 60)

    document.getElementById("timer").innerText =
      "Next game in " + hours + "h"
  }

  update()
  setInterval(update, 60000)
}

// SHARE
function share(){
  navigator.clipboard.writeText(
    "DailyKickoff ⚽\n" +
    resultGrid + "\n" +
    "Play: https://www.dailykickoffgame.com"
  )
  alert("Copied!")
}

// INIT
render()
updateMistakes()

</script>

</body>
</html>
