<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Higher Lower Game</title>
</head>

<body>

<h1>Higher Lower 📈</h1>

<p id="question"></p>

<button onclick="guess('higher')">Higher</button>
<button onclick="guess('lower')">Lower</button>

<p id="result"></p>
<p id="score"></p>

<script>
 const seed = getDailySeed()
const index = seed % players.length
const answer = players[index]
 
 function getDailySeed(){
  const today = new Date().toISOString().slice(0,10)
  return today.split("-").join("")
}

const data = [12,45,78,23,67,89,34,56]

const seed = getDailySeed()
let index = seed % data.length

let a = data[index]
let b = data[(index+1) % data.length]

 window.current = {a,b}

 document.getElementById("question").innerText =
  a + " vs " + b
}

function guess(type){
 let {a,b} = window.current

 if((type=="higher" && b>a) || (type=="lower" && b<a)){
   score++
   document.getElementById("result").innerText="Correct"
 } else {
   score=0
   document.getElementById("result").innerText="Wrong"
 }

 document.getElementById("score").innerText="Score: "+score
 newRound()
}

newRound()

</script>

</body>
</html>
