<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Higher or Lower</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

#question {
  font-size: 28px;
  margin: 30px 0;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.higher { background: #22c55e; }
.lower { background: #ef4444; }

#timer { margin-top: 20px; }
</style>
</head>

<body>

<h1>Higher or Lower</h1>
<p>Guess which number is higher</p>

<div id="question"></div>

<button class="higher" onclick="guess('higher')">Higher</button>
<button class="lower" onclick="guess('lower')">Lower</button>

<div id="result"></div>
<div id="score"></div>

<button onclick="share()">Share</button>

<p id="timer"></p>

<script>

// DATA
const data = [12,45,78,23,67,89,34,56,91,5,38,72,60,15,44,83]

// STATE
let current = null
let next = null
let score = 0
let gameOver = false
let resultGrid = ""

// RANDOM PICK
function getRandom(){
  return data[Math.floor(Math.random() * data.length)]
}

// NEW ROUND
function newRound(){
  if(current === null){
    current = getRandom()
  } else {
    current = next
  }

  do {
    next = getRandom()
  } while(next === current)

  document.getElementById("question").innerText =
    current + " vs " + next
}

// GUESS
function guess(type){
  if(gameOver) return

  const correct =
    (type === "higher" && next > current) ||
    (type === "lower" && next < current)

  if(correct){
    score++
    resultGrid += "🟩"
    document.getElementById("result").innerText = "✅ Correct!"
    newRound()
  } else {
    resultGrid += "🟥"
    document.getElementById("result").innerText = "💀 Game Over"
    endGame()
  }

  document.getElementById("score").innerText =
    "Score: " + score
}

// END GAME
function endGame(){
  gameOver = true
  startCountdown()
}

// COUNTDOWN (SADECE SONDA)
function startCountdown(){
  function update(){
    let now = new Date()
    let tomorrow = new Date()
    tomorrow.setHours(24,0,0,0)

    let diff = tomorrow - now
    let hours = Math.floor(diff / 1000 / 60 / 60)

    document.getElementById("timer").innerText =
      "Next game in " + hours + "h"
  }

  update()
  setInterval(update, 60000)
}

// SHARE
function share(){
  navigator.clipboard.writeText(
    "DailyKickoff ⚽\n" +
    resultGrid + "\n" +
    "Score: " + score + "\n" +
    "Play: https://www.dailykickoffgame.com"
  )
  alert("Copied!")
}

// INIT
newRound()
document.getElementById("score").innerText = "Score: 0"

</script>

</body>
</html>
