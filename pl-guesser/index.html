<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PL Guesser</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

input {
  padding: 10px;
  margin-top: 20px;
}

button {
  padding: 10px;
  margin: 10px;
}

#timer { margin-top: 20px; }
</style>
</head>

<body>

<h1>PL Guesser ⚽</h1>
<p>Guess today's player</p>

<input id="guess" placeholder="Enter player name">
<br>
<button onclick="check()">Guess</button>

<p id="result"></p>
<p id="attempts"></p>
<p id="streak"></p>

<button onclick="share()">Share</button>

<p id="timer"></p>

<script>

// DATA
const players = ["messi","ronaldo","haaland","salah","mbappe","kane","neymar"]

// DAILY
function getToday(){
  return new Date().toISOString().slice(0,10)
}

const today = getToday()
const seed = today.replaceAll("-", "")
const answer = players[seed % players.length]

// STATE
let attempts = 0
const maxAttempts = 5
let gameOver = false

let streak = parseInt(localStorage.getItem("streak") || "0")
let lastPlayed = localStorage.getItem("lastPlayed")

document.getElementById("streak").innerText = "Streak: " + streak
updateAttempts()

// GUESS
function check(){
  if(gameOver) return

  let input = document.getElementById("guess").value.toLowerCase().trim()
  if(!input) return

  attempts++

  if(input === answer){
    document.getElementById("result").innerText = "🎉 Correct!"
    handleStreak(true)
    endGame()
  } else {
    document.getElementById("result").innerText =
      `❌ Wrong (${attempts}/${maxAttempts}) Hint: ${getHint()}`
  }

  if(attempts >= maxAttempts){
    document.getElementById("result").innerText =
      "💀 Game Over! Answer: " + answer
    handleStreak(false)
    endGame()
  }

  updateAttempts()
}

// HINT SYSTEM (DAHA İYİ)
function getHint(){
  if(attempts === 1) return "Starts with: " + answer[0].toUpperCase()
  if(attempts === 2) return "Ends with: " + answer.slice(-1).toUpperCase()
  if(attempts === 3) return "Length: " + answer.length
  return "Think harder 😄"
}

// ATTEMPTS UI
function updateAttempts(){
  document.getElementById("attempts").innerText =
    `Attempts: ${attempts}/${maxAttempts}`
}

// STREAK
function handleStreak(win){
  if(lastPlayed === today) return

  if(win && lastPlayed === getYesterday()){
    streak++
  } else if(win){
    streak = 1
  } else {
    streak = 0
  }

  localStorage.setItem("streak", streak)
  localStorage.setItem("lastPlayed", today)

  document.getElementById("streak").innerText = "Streak: " + streak
}

function getYesterday(){
  let d = new Date()
  d.setDate(d.getDate() - 1)
  return d.toISOString().slice(0,10)
}

// END GAME
function endGame(){
  gameOver = true
  document.getElementById("guess").disabled = true
  startCountdown()
}

// COUNTDOWN
function startCountdown(){
  function update(){
    let now = new Date()
    let tomorrow = new Date()
    tomorrow.setHours(24,0,0,0)

    let diff = tomorrow - now
    let hours = Math.floor(diff / 1000 / 60 / 60)

    document.getElementById("timer").innerText =
      "Next player in " + hours + "h"
  }

  update()
  setInterval(update, 60000)
}

// SHARE
function share(){
  navigator.clipboard.writeText(
    "DailyKickoff ⚽\n" +
    `Attempts: ${attempts}\n` +
    "Play: https://www.dailykickoffgame.com"
  )
  alert("Copied!")
}

</script>

</body>
</html>
