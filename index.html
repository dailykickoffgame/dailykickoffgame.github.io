<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DailyKickoff ⚽ | Daily Football Games</title>

<meta name="description" content="Play daily football games: Connections, Higher or Lower, and Player Guess. New challenges every day!">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

header {
  padding:40px 20px;
}

h1 {
  font-size:36px;
}

.subtitle {
  opacity:0.7;
}

.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
  max-width:900px;
  margin:auto;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  transition:0.2s;
}

.card:hover {
  transform:scale(1.05);
}

button {
  margin-top:15px;
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#22c55e;
  color:white;
}

footer {
  margin-top:40px;
  opacity:0.6;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <h1>DailyKickoff ⚽</h1>
  <p class="subtitle">Play new football games every day</p>
</header>

<div class="container">

  <div class="card">
    <h2>🧠 Connections</h2>
    <p>Find 4 related words</p>
    <a href="connections/index.html">
      <button>Play</button>
    </a>
  </div>

  <div class="card">
    <h2>📈 Higher or Lower</h2>
    <p>Guess which number is higher</p>
    <a href="higher-lower/index.html">
      <button>Play</button>
    </a>
  </div>

  <div class="card">
    <h2>⚽ Player Guesser</h2>
    <p>Guess today's football player</p>
    <a href="pl-guesser/index.html">
      <button>Play</button>
    </a>
  </div>

</div>

<footer>
  <p>New games daily • Challenge your football knowledge</p>
</footer>

</body>
</html>
